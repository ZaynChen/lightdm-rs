name: CI

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/CI.yml
      - lightdm
      - examples
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/CI.yml
      - lightdm
      - examples
  workflow_dispatch:

jobs:
  check:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zaynchen/lightdm-rs/lightdm:latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: "lightdm: tests"
        run: cargo test --all-features
      - name: "lightdm: build"
        run: cargo build --all-features
      - name: "lightdm: clippy"
        run: cargo clippy --all-features

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Rustfmt Check
        uses: actions-rust-lang/rustfmt@v1

  docs:
    name: docs embed check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          set-safe-directory: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: git submodule update --checkout
      - run: cargo install rustdoc-stripper
      - run: ./generator.py --embed-docs
      - run: ./generator.py --strip-docs
      - run: git diff --exit-code
